<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121212" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>

    <!-- Glowing Cyan/Accent Grid -->
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.04" />
    </pattern>

    <!-- Accent Blur -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Cyan to Transparent Gradient for paths -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="800" height="800" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid -->
  <rect width="800" height="800" fill="url(#dotGrid)" />

  <!-- Background Glowing Orbs -->
  <circle cx="150" cy="650" r="250" fill="#00e5ff" opacity="0.08" filter="url(#glow)" />
  <circle cx="650" cy="150" r="300" fill="#00e5ff" opacity="0.05" filter="url(#glow)" />

  <!-- Geometric Abstract Shapes Overlay -->
  <!-- Beautiful flowing wave lines -->
  <g fill="none" stroke-width="1.5">
    <path d="M -100 400 Q 300 100 900 400" stroke="url(#lineGrad)" />
    <path d="M -100 420 Q 300 150 900 420" stroke="url(#lineGrad)" opacity="0.8" />
    <path d="M -100 440 Q 300 200 900 440" stroke="url(#lineGrad)" opacity="0.6" />
    <path d="M -100 460 Q 300 250 900 460" stroke="url(#lineGrad)" opacity="0.4" />
    <path d="M -100 480 Q 300 300 900 480" stroke="url(#lineGrad)" opacity="0.2" />
    <path d="M -100 500 Q 300 350 900 500" stroke="url(#lineGrad)" opacity="0.1" />

    <path d="M -100 300 Q 600 700 900 300" stroke="url(#lineGrad2)" />
    <path d="M -100 280 Q 600 650 900 280" stroke="url(#lineGrad2)" opacity="0.8" />
    <path d="M -100 260 Q 600 600 900 260" stroke="url(#lineGrad2)" opacity="0.6" />
    <path d="M -100 240 Q 600 550 900 240" stroke="url(#lineGrad2)" opacity="0.4" />
  </g>

  <!-- A few subtle floating tech-like elements -->
  <g fill="#00e5ff" opacity="0.2">
    <!-- Plus signs -->
    <path d="M 650 600 v -6 h 1.5 v 6 h 6 v 1.5 h -6 v 6 h -1.5 v -6 h -6 v -1.5 h 6" />
    <path d="M 150 200 v -4 h 1.5 v 4 h 4 v 1.5 h -4 v 4 h -1.5 v -4 h -4 v -1.5 h 4" opacity="0.5"/>
    
    <!-- Dots -->
    <circle cx="700" cy="300" r="2" />
    <circle cx="250" cy="700" r="3" />
    <circle cx="450" cy="150" r="1.5" />
    <circle cx="350" cy="600" r="2" opacity="0.5" />
    <circle cx="600" cy="450" r="1.5" opacity="0.3" />
  </g>
</svg>
